        - coreutils/hostname.qmd
        - coreutils/ls.qmd
        - coreutils/mkdir.qmd
        - coreutils/wc.qmd
    - part: Util Linux
        - util-linux/su.qmd
        - util-linux/unshare.qmd
    - part: Tools
      chapters:
        - tools/jq.qmd
        - tools/xml.qmd
    - part: Python
      chapters:
        - python/tools/requests.qmd
        - python/lang.qmd
