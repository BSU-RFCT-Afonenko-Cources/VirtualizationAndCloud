assignments:
- title: Работа в Ubuntu
  description: |-
    - командная оболочка bash, навигация, echo, перенаправление
    - файловая система
    - управление паравами chmod
    - текстовый редактор nano
    - установка управление пакетами
    - sudo
    - управление пользователями и группами
    - управление системой systemd
    - network, узнать ip адрес, сделать ping
    - утилита curl
    - консольный браузер lynx
  time-limit-minutes: 120
  steps:
  - title: Первые шаги
    actions:
    - host:
        pre-step: |-
          # ----------EXEC----------
          # ---	prepare.sh	---
          cat <<'EOF' > prepare.sh
          #!/bin/bash

          mkdir /home/ubuntu/mock
          chown ubuntu:ubuntu /home/ubuntu/mock
          EOF

          # ----------RUN----------
          chmod u+x prepare.sh
          ./prepare.sh
        check: |-
          # ----------EXEC----------
          # ---	check.fish	---
          cat <<'EOF' > check.fish
          exit 0
          EOF

          # ----------RUN----------
          chmod u+x check.fish
          ./check.fish
        solution: |-
          # ---------------PRE-STEP---------------
          # ----------EXEC----------
          # ---	prepare.sh	---
          cat <<'EOF' > prepare.sh
          #!/bin/bash

          mkdir /home/ubuntu/mock
          chown ubuntu:ubuntu /home/ubuntu/mock
          EOF

          # ----------RUN----------
          chmod u+x prepare.sh
          ./prepare.sh
          # ---------------SOLUTION---------------
          # ----------EXEC----------
          # ---	check.fish	---
          cat <<'EOF' > check.fish
          exit 0
          EOF

          # ----------RUN----------
          chmod u+x check.fish
          ./check.fish
        hints: |-
          Выведите имя текущего пользователя на экран

          #### Упражнение 1 (Начнём)

          ``` bash
          echo $USER
          ```
    description: |-
      Выведите имя текущего пользователя на экран

      #### Упражнение 1 (Начнём)

      ``` bash
      echo $USER
      ```
  - title: Текстовый редактор nano
    actions:
    - host:
        pre-step: |-
          # ----------IMPORT----------
          # ---	app.conf	---
          cat <<'EOF' > app.conf
          [database]
          server = 192.0.2.62
          port = 5432
          username = admin
          password = secure_password_123
          file = "payroll.dat"

          [server]
          host = localhost
          port = 8080
          debug_mode = true
          enabled = no

          [logging]
          level = INFO
          file_path = /var/log/app.log
          max_size = 10MB
          EOF


          # ----------EXEC----------
          # ---	setmod.sh	---
          cat <<'EOF' > setmod.sh
          #!/bin/bash

          mkdir /home/ubuntu/nano
          cp app.conf /home/ubuntu/nano/app.conf
          chown -R ubuntu:ubuntu /home/ubuntu/nano
          EOF

          # ----------RUN----------
          chmod u+x setmod.sh
          ./setmod.sh
        check: |-
          # ----------EXEC----------
          # ---	file.fish	---
          cat <<'EOF' > file.fish
          #!/bin/fish

          if not test -f /home/ubuntu/nano/notes.txt
              exit 1
          end

          set NOTES (cat /home/ubuntu/nano/notes.txt)

          if not string match -q "*Ubuntu Server*" "$NOTES"
              exit 1
          end

          if not string match -q "*Bash*" "$NOTES"
              exit 1
          end

          if not string match -q "*Filesystem*" "$NOTES"
              exit 1
          end
          EOF
          # ---	config.fish	---
          cat <<'EOF' > config.fish
          #!/bin/fish

          if not string match -q "*enabled = yes*" (cat /home/ubuntu/nano/app.conf)
              exit 1
          end
          EOF

          # ----------RUN----------
          chmod u+x file.fish
          ./file.fish
          chmod u+x config.fish
          ./config.fish
        hints: |-
          `nano` — простой консольный текстовый редактор. Он удобен для первых
          лабораторных работ, потому что показывает основные сочетания клавиш
          прямо в нижней части экрана.

          Полезные клавиши:

          ``` text
          Ctrl + O  — сохранить файл
          Enter     — подтвердить имя файла
          Ctrl + X  — выйти
          Ctrl + W  — поиск
          ```
    description: |-
      Перейдите в каталог `~/nano`. После выполнения всех заданий нажмите
      кнопку проверки

      #### Упражнение 1 (Файл)

      Создайте файл `notes.txt` в редакторе `nano` и запишите в него три
      строки:

      ``` text
      Ubuntu Server
      Bash
      Filesystem
      ```

      #### Упражнение 2 (Конфигурация)

      Отредактируйте конфигурации `app.conf`, откройте его в `nano` и замените
      `enabled = no` на `enabled = yes`.
  - title: Командная оболочка bash
    actions:
    - host:
        pre-step: |-
          # ----------EXEC----------
          # ---	prepare.sh	---
          cat <<'EOF' > prepare.sh
          #!/bin/bash

          mkdir /home/ubuntu/bash
          chown ubuntu:ubuntu /home/ubuntu/bash
          EOF

          # ----------RUN----------
          chmod u+x prepare.sh
          ./prepare.sh
        check: |-
          # ----------EXEC----------
          # ---	report.fish	---
          cat <<'EOF' > report.fish
          #!/bin/fish

          set REPORT (cat /home/ubuntu/report.txt)

          if not string match -q "*$USER*" "$REPORT"
              exit 1
          end

          if not string match -q "*"(hostname)"*" "$REPORT"
              exit 1
          end
          EOF
          # ---	array.fish	---
          cat <<'EOF' > array.fish
          #!/bin/fish

          set SOL /home/ubuntu/bash/array.sh

          if not test (bash "$SOL" a b apple) = "apple"
              exit 1
          end

          if not test (bash "$SOL" one three elephant cat) = "elephant"
              exit 1
          end
          EOF
          # ---	backup.fish	---
          cat <<'EOF' > backup.fish
          #!/bin/fish

          set tmp (mktemp -d)
          cd tmp

          set SOL /home/ubuntu/bash/backup.sh

          echo hello > file.txt

          bash "$SOL" file.txt

          if not test -f file.txt.bak
            exit 1
          end

          if not test (cat file.txt.bak) = hello
              exit 1
          end

          set out (bash "$SOL" "no.txt" 2>&1)

          if not $status = 1
            exit 1
          end

          if not "$out" = missing
            exit 1
          end
          EOF
          # ---	project.fish	---
          cat <<'EOF' > project.fish
          #!/bin/fish

          set tmp (mktemp -d)
          set SOL /home/ubuntu/bash/project.sh

          cd "$tmp"

          bash "$SOL" project

          if not test -d project/src
              exit 1
          end

          if not test -d project/data
              exit 1
          end

          if not test -d project/reports
              exit 1
          end

          if not test -f project/README.md
              exit 1
          end

          if not string match -q "*project*" (cat project/README.md)
              exit 1
          end
          EOF

          # ----------RUN----------
          chmod u+x report.fish
          ./report.fish
          chmod u+x array.fish
          ./array.fish
          chmod u+x backup.fish
          ./backup.fish
          chmod u+x project.fish
          ./project.fish
        solution: |-
          # ---------------PRE-STEP---------------
          # ----------EXEC----------
          # ---	prepare.sh	---
          cat <<'EOF' > prepare.sh
          #!/bin/bash

          mkdir /home/ubuntu/bash
          chown ubuntu:ubuntu /home/ubuntu/bash
          EOF

          # ----------RUN----------
          chmod u+x prepare.sh
          ./prepare.sh
          # ---------------SOLUTION---------------
          # ----------IMPORT----------
          # ---	report.sh	---
          cat <<'EOF' > report.sh
          #!/bin/bash

          echo "$(whoami)" > report.txt
          echo "$(hostname)" >> report.txt
          ls >> report.txt
          EOF
          # ---	backup.sh	---
          cat <<'EOF' > backup.sh
          #!/bin/bash

          [[ -f $1 ]] || { echo "missing"; return 1; }
          cp "$1" "$1.bak"
          EOF
          # ---	project.sh	---
          cat <<'EOF' > project.sh
          #!/bin/bash

          d=$1
          mkdir -p "$d"/{src,data,reports}
          echo "# $d" > "$d/README.md"
          EOF


          # ----------EXEC----------
          # ---	report.sh	---
          cat <<'EOF' > report.sh
          #!/bin/bash

          echo "$(whoami)" > report.txt
          echo "$(hostname)" >> report.txt
          ls >> report.txt
          EOF

          # ----------RUN----------
          chmod u+x report.sh
          ./report.sh
        hints: |-
          Изучите

          - [Скрипты](http://10.135.250.210/theory/shell/sh.html#sec-shell-sh-script)
          - [Перенаправление ввода и вывода](http://10.135.250.210/theory/shell/sh.html#sec-shell-sh-io-redirect)
          - [Массивы](http://10.135.250.210/theory/shell/bash.html#sec-shell-bash-array)

          #### Пример 1 (Запуск скрипта)

          ``` bash
          chmod u+x script.sh
          ./script.sh
          ```
    description: |-
      Для начала перейдите каталог `~/bash`. После выполнения всех заданий
      нажмите кнопку проверки

      #### Упражнение 1 (Отчёт)

      Создайте файл `report.txt`, в который запишите имя текущего
      пользователя, имя хоста и список файлов текущего каталога.

      #### Упражнение 2 (Проект)

      Создать скрипт `project.sh`, который принимает имя проекта и создаёт
      структуру:

      ``` text
      project/
        src/
        data/
        reports/
        README.md
      ```

      В `README.md` должна быть строка `# project`.

      #### Упражнение 3 (Резервное копирование)

      Создать скрипт `backup.sh`, который принимает путь к файлу и создаёт его
      копию с расширением `.bak`. Если файла нет, вывести `missing` и
      завершиться с кодом `1`.

      #### Упражнение 4 (Массив)

      Создать скрипт `array.sh`, который принимает список слов и выводит самое
      длинное слово.
  - title: Файловая система
    actions:
    - host:
        pre-step: |-
          # ----------EXEC----------
          # ---	prepare.sh	---
          cat <<'EOF' > prepare.sh
          #!/bin/bash

          mkdir -p /home/ubuntu/filesystem/{docs,archive}
          touch /home/ubuntu/filesystem/archive/file-bak.txt
          chmod -R ubuntu:ubuntu /home/ubuntu/filesystem/
          EOF

          # ----------RUN----------
          chmod u+x prepare.sh
          ./prepare.sh
        check: |-
          # ----------EXEC----------
          # ---	structure.fish	---
          cat <<'EOF' > structure.fish
          #!/bin/fish

          if not test -d /home/ubuntu/filesystem/scripts
              exit 1
          end

          set lines (find /home/ubuntu/filesystem/docs -name "*.txt" | wc -l)

          if not  test "$lines" = 2
              exit 1
          end

          set lines (find /home/ubuntu/filesystem/scripts -name "*.sh" | wc -l)

          if not test "$lines" = 1
              exit 1
          end
          EOF
          # ---	archive.fish	---
          cat <<'EOF' > archive.fish
          #!/bin/fish

          set lines (find /home/ubuntu/filesystem/archive -name "*-bak*" | wc -l)

          if not test "$lines" = 1
              exit 1
          end
          EOF
          # ---	execute.fish	---
          cat <<'EOF' > execute.fish
          #!/bin/fish

          set perm (stat -c %A (find /home/ubuntu/filesystem/scripts -name "*.sh" | head -n 1) )

          if not test "$perm" = "-rwxr-xr--"
              echo "Incorrect script file permission"
              exit 1
          end
          EOF
          # ---	read.fish	---
          cat <<'EOF' > read.fish
          #!/bin/fish

          for f in (find /home/ubuntu/filesystem/docs -name "*.txt")
              set perm (stat -c %A "$f")
              if not test "$perm" = "-rw---x---"
                  echo "Incorrect docs file permission"
                  exit 1
              end
          end
          EOF

          # ----------RUN----------
          chmod u+x structure.fish
          ./structure.fish
          chmod u+x archive.fish
          ./archive.fish
          chmod u+x execute.fish
          ./execute.fish
          chmod u+x read.fish
          ./read.fish
        hints: |
    description: |-
      Прейдите в каталог `~/filesystem`. После выполнения всех заданий нажмите
      кнопку проверки

      #### Упражнение 1 (Структура)

      Расширьте структуру каталогов до заданной:

      ``` text
      filesystem/
      ├── docs/
      ├── scripts/
      └── archive/
      ```

      В каталоге `docs` создайте два текстовых файла с произвольным именем и
      расширеним `.txt`, а в каталоге `scripts` — один файл скрипта с
      расширеним `.sh`.

      #### Упражнение 2 (Архив)

      Очистите архив. Скопируйте один файл из каталога `doсs` в архив и
      добавьте `-bak` к его имени.

      #### Упражнение 3 (Права запуска)

      Предоставьте владельцу и группе владельца разрешение на запуск скрипта.

      #### Упражнение 4 (Права чтения)

      Запретите доступ на чтение файлов внутри каталога `docs` всем, кроме
      владельца.
  - title: Система управления пакетами APT
    actions:
    - host:
        pre-step: |-
          # ----------EXEC----------
          # ---	prepare.sh	---
          cat <<'EOF' > prepare.sh
          #!/bin/bash

          mkdir /home/ubuntu/package
          chown ubuntu:ubuntu /home/ubuntu/package
          EOF

          # ----------RUN----------
          chmod u+x prepare.sh
          ./prepare.sh
        check: |-
          # ----------EXEC----------
          # ---	install.fish	---
          cat <<'EOF' > install.fish
          #!/bin/fish

          if not (tree /home/ubuntu/bash) = (cat /home/ubuntu/package/tree.txt)
              exit 1
          end
          EOF
          # ---	update.fish	---
          cat <<'EOF' > update.fish
          #!/bin/fish

          if not (cat /home/ubuntu/package/curl.txt) = (apt show curl)
              exit 1
          end
          EOF

          # ----------RUN----------
          chmod u+x install.fish
          ./install.fish
          chmod u+x update.fish
          ./update.fish
        hints: |-
          Решение:

          ``` bash
          sudo apt install -y tree
          ```

          Решение:

          ``` bash
          sudo apt update
          apt show curl
          ```
    description: |-
      Перейдите в каталог `~/package`. После выполнения всех заданий нажмите
      кнопку проверки

      #### Упражнение 1 (Обновление)

      Обновите индекс пакетов и посмотрите информацию о пакете `curl` с
      помощью команды `apt show`. Сохраните вывод в файл `curl.txt`

      #### Упражнение 2 (Установка)

      Установите пакет `tree`, посмотрите дерево каталога `/home/ubuntu/bash`,
      сохраните вывод в файл `tree.txt`.
  - title: Средство загрузки curl
    actions:
    - host:
        pre-step: |-
          # ----------EXEC----------
          # ---	prepare.sh	---
          cat <<'EOF' > prepare.sh
          #!/bin/bash

          mkdir /home/ubuntu/curl
          chown ubuntu:ubuntu /home/ubuntu/curl
          EOF

          # ----------RUN----------
          chmod u+x prepare.sh
          ./prepare.sh
        check: |-
          # ----------EXEC----------
          # ---	header.fish	---
          cat <<'EOF' > header.fish
          #!/bin/fish

          if not (cat /home/ubuntu/curl/header.txt) = (curl -I https://ubuntu.com)
              exit 1
          end
          EOF
          # ---	download.fish	---
          cat <<'EOF' > download.fish
          #!/bin/fish

          if not string match -q "*"(curl -s https://ubuntu.com | wc -l)"*" (cat /home/ubuntu/curl/lines.txt)
              exit 1
          end
          EOF

          # ----------RUN----------
          chmod u+x header.fish
          ./header.fish
          chmod u+x download.fish
          ./download.fish
        hints: |-
          `curl` — консольная утилита для выполнения сетевых запросов. Её часто
          используют для проверки HTTP-сервисов, загрузки файлов, просмотра
          заголовков и тестирования API.

          Сохрание заголовков

          ``` bash
          curl -I https://ubuntu.com
          ```

          Решение:

          ``` bash
          curl -L https://ubuntu.com -o /home/ubuntu/curl/ubuntu.html
          wc -l /home/ubuntu/curl/ubuntu.html
          ```
    description: |-
      Перейдите в каталог `~/curl`. После выполнения всех заданий нажмите
      кнопку проверки

      #### Упражнение 1 (Заголовок)

      Сохраните HTTP-заголовки сайта <https://ubuntu.com> в файл `header.txt`.

      #### Упражнение 2 (Загрузка)

      Скачайте HTML-страницу <https://ubuntu.com> в файл, определите
      количество строк в нём, и сохраните ответ в файл `lines.txt`
  virtual-machines:
  - host:
      template: Ubuntu 26.04 LTS — KVM/QEMU Lab
      prepare: ''
